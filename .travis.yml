language: generic 
sudo: required
services:
  - docker

before_install:
  - docker build -t alfalcon/docker-react -f Dockerfile.dev .

script:
  - docker run -e CI=true alfalcon/docker-react npm run test

deploy:
  provider: elasticbeanstalk
  access_key_id:
    secure: "Encypted $AWS_ACCESS_KEY"
  secret_access_key:
    secure: "Encypted $AWS_ACCESS_SECRET"
  region: "us-west-2"
  app: "docker-react"
  env: "Dockerreact-env"
  bucket_name: "elasticbeanstalk-us-west-2-514585915335"
  bucket_path: "docker-react"
  on:
    branch: master